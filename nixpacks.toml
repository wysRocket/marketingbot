[variables]
NIXPACKS_SKIP_BUILD = "true"

[phases.setup]
nixPkgs = ["nodejs_20", "python3", "chromium", "unzip", "curl", "wget", "ffmpeg", "libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2", "libdrm2", "libxkbcommon0", "libxcomposite1", "libxdamage1", "libxfixes3", "libxrandr2", "libgbm1", "libasound2"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["echo 'Skipping build - using ts-node directly'"]

[start]
cmd = "BOT_SITE_PROFILE=guidenza BOT_ENABLED=1 CONCURRENCY=1 TOTAL_ROUNDS=1 ROUND_TIMEOUT_MS=120000 RAILWAY_REPLICA_ID=local npx ts-node --transpile-only src/index.patchright.ts"