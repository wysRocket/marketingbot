<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extension Telemetry Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;height:100vh;display:flex;flex-direction:column}
.header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.header h1{font-size:16px;font-weight:600;color:#58a6ff}
.header .badge{background:#1f6feb;color:#fff;font-size:11px;padding:2px 8px;border-radius:10px}
.header .status{font-size:11px;color:#8b949e}
.header .status::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;background:#3fb950;margin-right:4px;vertical-align:middle;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.toolbar{background:#161b22;padding:8px 20px;display:flex;gap:8px;flex-shrink:0;border-bottom:1px solid #30363d}
.toolbar select,.toolbar button{background:#21262d;color:#e6edf3;border:1px solid #30363d;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.toolbar button:hover{background:#30363d}
.toolbar .active{background:#1f6feb;border-color:#1f6feb}
.stats{display:flex;gap:12px;padding:8px 20px;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0;flex-wrap:wrap}
.stat{display:flex;flex-direction:column;min-width:120px}
.stat .label{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px}
.stat .value{font-size:18px;font-weight:700;color:#58a6ff}
.stat .bar{height:4px;border-radius:2px;margin-top:2px;background:#21262d;overflow:hidden}
.stat .bar .fill{height:100%;border-radius:2px;background:#1f6feb;transition:width .3s}
.table-wrap{flex:1;overflow-y:auto;padding:0}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:1}
th{background:#161b22;color:#8b949e;font-weight:500;text-align:left;padding:8px 12px;border-bottom:1px solid #30363d;cursor:pointer;user-select:none;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
th:hover{color:#e6edf3}
td{padding:6px 12px;border-bottom:1px solid #21262d;vertical-align:top}
tr:hover td{background:#161b22}
.domain-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600}
.domain-similarweb{background:#1a3a2a;color:#3fb950}
.domain-mixpanel{background:#3d2a1a;color:#d29922}
.domain-growthbook{background:#1a2a3d;color:#58a6ff}
.domain-other{background:#21262d;color:#8b949e}
.method{font-weight:600;font-size:11px}
.method-GET{color:#3fb950}
.method-POST{color:#d29922}
.method-PUT{color:#58a6ff}
.method-DELETE{color:#f85149}
.url-cell{max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'SF Mono',Monaco,monospace;font-size:11px;color:#8b949e}
.body-cell{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'SF Mono',Monaco,monospace;font-size:11px;color:#8b949e;cursor:pointer}
.body-cell:hover{color:#58a6ff}
.detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center}
.detail-overlay.open{display:flex}
.detail-panel{background:#161b22;border:1px solid #30363d;border-radius:12px;width:80%;max-width:900px;max-height:80vh;overflow-y:auto;padding:20px}
.detail-panel h2{font-size:14px;color:#58a6ff;margin-bottom:12px}
.detail-panel pre{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:12px;font-family:'SF Mono',Monaco,monospace;font-size:11px;color:#e6edf3;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
.detail-panel .meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.detail-panel .meta div{font-size:12px}
.detail-panel .meta .k{color:#8b949e}
.detail-panel .close{position:absolute;top:20px;right:20px;color:#8b949e;cursor:pointer;font-size:18px}
</style>
</head>
<body>
<div class="header">
<h1>🔍 Extension Telemetry</h1>
<span class="badge" id="count">0</span>
<span class="status">Live</span>
</div>
<div class="toolbar">
<select id="domainFilter"><option value="">All Domains</option><option value="similarweb">SimilarWeb</option><option value="mixpanel">Mixpanel</option><option value="growthbook">GrowthBook</option></select>
<select id="methodFilter"><option value="">All Methods</option><option value="GET">GET</option><option value="POST">POST</option></select>
<button id="clearBtn">Clear</button>
</div>
<div class="stats" id="stats"></div>
<div class="table-wrap">
<table>
<thead><tr><th>Time</th><th>Domain</th><th>Method</th><th>URL</th><th>Status</th><th>Req Body</th><th>Res Body</th></tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
<div class="detail-overlay" id="overlay">
<div class="detail-panel" id="detail"></div>
</div>
<script>
const domainClasses={similarweb:'domain-similarweb',mixpanel:'domain-mixpanel',growthbook:'domain-growthbook'};
function domainClass(d){for(const[k,v]of Object.entries(domainClasses))if(d.includes(k))return v;return'domain-other'}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmtTime(ts){const d=new Date(ts);return d.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'})+'.'+String(d.getMilliseconds()).padStart(3,'0')}
function fmtBody(b){if(!b)return'—';if(b.length>100)return b.slice(0,100)+'…';return b}
let events=[],ws;
function connect(){ws=new WebSocket(`ws://${location.host}/ws`);ws.onmessage=e=>{const m=JSON.parse(e.data);if(m.type==='init'){events=m.events.reverse();render()}else if(m.type==='event'){events.unshift(m.event);render()}else if(m.type==='cleared'){events=[];render()}};ws.onclose=()=>setTimeout(connect,2000)}
function getFiltered(){let f=[...events];const df=document.getElementById('domainFilter').value,mf=document.getElementById('methodFilter').value;if(df)f=f.filter(e=>e.matchedDomain.includes(df));if(mf)f=f.filter(e=>e.method===mf);return f}
function render(){const f=getFiltered(),tb=document.getElementById('tbody'),ct=document.getElementById('count');ct.textContent=events.length;tb.innerHTML=f.slice(0,200).map((e,i)=>`<tr data-idx="${i}"><td>${fmtTime(e.timestamp)}</td><td><span class="domain-badge ${domainClass(e.matchedDomain)}">${esc(e.matchedDomain)}</span></td><td><span class="method method-${e.method}">${e.method}</span></td><td class="url-cell" title="${esc(e.url)}">${esc(e.url)}</td><td>${e.statusCode||'—'}</td><td class="body-cell" data-body="${i}-req">${fmtBody(e.requestBody)}</td><td class="body-cell" data-body="${i}-res">${fmtBody(e.responseBody)}</td></tr>`).join('');renderStats(f)}
function renderStats(f){const domains={},methods={};f.forEach(e=>{domains[e.matchedDomain]=(domains[e.matchedDomain]||0)+1;methods[e.method]=(methods[e.method]||0)+1});const el=document.getElementById('stats');const top=Object.entries(domains).sort((a,b)=>b[1]-a[1]).slice(0,5);const total=f.length||1;el.innerHTML=top.map(([d,c])=>`<div class="stat"><span class="label">${esc(d)}</span><span class="value">${c}</span><div class="bar"><div class="fill" style="width:${(c/total*100).toFixed(0)}%"></div></div></div>`).join('')}
function showDetail(e,type){const o=document.getElementById('overlay'),d=document.getElementById('detail');const body=type==='req'?e.requestBody:e.responseBody;const label=type==='req'?'Request Body':'Response Body';d.innerHTML=`<h2>${label} — ${esc(e.method)} ${esc(e.url)}</h2><div class="meta"><div><span class="k">Domain:</span> ${esc(e.matchedDomain)}</div><div><span class="k">Status:</span> ${e.statusCode||'—'}</div><div><span class="k">Time:</span> ${new Date(e.timestamp).toISOString()}</div><div><span class="k">Type:</span> ${type}</div></div><pre>${esc(body||'(empty)')}</pre>`;o.classList.add('open')}
document.getElementById('tbody').addEventListener('click',e=>{const c=e.target.closest('.body-cell');if(!c)return;const[cfg,type]=c.dataset.body.split('-');const i=parseInt(cfg);const f=getFiltered();if(f[i])showDetail(f[i],type==='req'?'req':'res')});
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open')});
document.getElementById('clearBtn').addEventListener('click',()=>fetch('/api/events',{method:'DELETE'}));
document.getElementById('domainFilter').addEventListener('change',render);
document.getElementById('methodFilter').addEventListener('change',render);
connect();
</script>
</body>
</html>
