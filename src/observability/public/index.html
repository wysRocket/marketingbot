<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extension Telemetry</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--blue:#58a6ff;--green:#3fb950;--amber:#d29922;--red:#f85149;--text:#e6edf3;--muted:#8b949e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;font-size:12px}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.header h1{font-size:14px;font-weight:600;color:var(--blue)}
.header .badge{background:#1f6feb;color:#fff;font-size:10px;padding:2px 8px;border-radius:10px}
.header .status{font-size:10px;color:var(--muted)}
.header .status.live::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.toolbar{background:var(--surface);padding:8px 20px;display:flex;gap:8px;flex-shrink:0;border-bottom:1px solid var(--border)}
.toolbar select,.toolbar button{background:#21262d;color:var(--text);border:1px solid var(--border);padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer}
.toolbar button:hover{background:#30363d}
.stats{display:flex;gap:12px;padding:8px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.stat{display:flex;flex-direction:column;min-width:100px}
.stat .label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.stat .value{font-size:16px;font-weight:700;color:var(--blue)}
.table-wrap{flex:1;overflow-y:auto}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:0;z-index:1}
th{background:var(--surface);color:var(--muted);font-weight:500;text-align:left;padding:6px 10px;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;user-select:none}
th:hover{color:var(--text)}
td{padding:5px 10px;border-bottom:1px solid #21262d;vertical-align:top;font-size:11px}
tr:hover td{background:#161b22}
.domain-badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600}
.domain-similarweb{background:#1a3a2a;color:#3fb950}
.domain-mixpanel{background:#3d2a1a;color:#d29922}
.domain-growthbook{background:#1a2a3d;color:#58a6ff}
.domain-other{background:#21262d;color:var(--muted)}
.method{font-weight:600;font-size:10px}
.method-GET{color:var(--green)}.method-POST{color:var(--amber)}.method-DELETE{color:var(--red)}
.url-cell{max-width:350px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'SF Mono',Monaco,monospace;font-size:10px;color:var(--muted)}
.body-cell{max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'SF Mono',Monaco,monospace;font-size:10px;color:var(--muted);cursor:pointer}
.body-cell:hover{color:var(--blue)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center}
.overlay.open{display:flex}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;width:80%;max-width:800px;max-height:80vh;overflow-y:auto;padding:16px}
.panel h2{font-size:12px;color:var(--blue);margin-bottom:10px}
.panel pre{background:#0d1117;border:1px solid var(--border);border-radius:4px;padding:10px;font-family:'SF Mono',Monaco,monospace;font-size:10px;color:var(--text);overflow-x:auto;white-space:pre-wrap;word-break:break-all}
.panel .meta{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.panel .meta div{font-size:11px}
.panel .meta .k{color:var(--muted)}
</style>
</head>
<body>
<div class="header">
  <h1>🔍 Extension Telemetry</h1>
  <span class="badge" id="count">0</span>
  <span class="status live" id="ws-status">Live</span>
</div>
<div class="toolbar">
  <select id="f-domain"><option value="">All Domains</option></select>
  <select id="f-method"><option value="">All Methods</option><option value="GET">GET</option><option value="POST">POST</option></select>
  <button id="btn-clear">Clear</button>
</div>
<div class="stats" id="stats"></div>
<div class="table-wrap">
  <table>
    <thead><tr><th>Time</th><th>Domain</th><th>Method</th><th>URL</th><th>Req Body</th><th>Res Body</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div class="overlay" id="overlay"><div class="panel" id="detail"></div></div>
<script>
const dc={similarweb:'domain-similarweb',mixpanel:'domain-mixpanel',growthbook:'domain-growthbook'};
function dcC(d){for(const[k,v]of Object.entries(dc))if(d.includes(k))return v;return'domain-other'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtT(ts){const d=new Date(ts);return d.toLocaleTimeString('en-US',{hour12:false})+'.'+String(d.getMilliseconds()).padStart(3,'0')}
function fmtB(b){if(!b)return'—';return b.length>80?b.slice(0,80)+'…':b}
let events=[],ws;
function connect(){
  ws=new WebSocket(`ws://${location.host}`);
  ws.onopen=()=>{document.getElementById('ws-status').className='status live';document.getElementById('ws-status').textContent='Live';};
  ws.onmessage=e=>{const m=JSON.parse(e.data);if(m.type==='init'){events=m.events;render();}else if(m.type==='event'){events.unshift(m.event);render();}else if(m.type==='cleared'){events=[];render();}};
  ws.onclose=()=>{document.getElementById('ws-status').className='status';document.getElementById('ws-status').textContent='Reconnecting…';setTimeout(connect,2000);};
}
function getFiltered(){let f=[...events];const d=document.getElementById('f-domain').value,m=document.getElementById('f-method').value;if(d)f=f.filter(e=>e.matchedDomain.includes(d));if(m)f=f.filter(e=>e.method===m);return f}
function render(){
  const f=getFiltered();
  document.getElementById('count').textContent=events.length;
  const tbody=document.getElementById('tbody');
  tbody.innerHTML=f.slice(0,300).map((e,i)=>`<tr data-idx="${i}"><td>${fmtT(e.timestamp)}</td><td><span class="domain-badge ${dcC(e.matchedDomain)}">${esc(e.matchedDomain)}</span></td><td><span class="method method-${e.method}">${e.method}</span></td><td class="url-cell" title="${esc(e.url)}">${esc(e.url)}</td><td class="body-cell" data-body="${i}-req">${fmtB(e.requestBody)}</td><td class="body-cell" data-body="${i}-res">${fmtB(e.responseBody)}</td></tr>`).join('');
  // Stats
  const domains={};f.forEach(e=>{domains[e.matchedDomain]=(domains[e.matchedDomain]||0)+1;});
  const top=Object.entries(domains).sort((a,b)=>b[1]-a[1]).slice(0,5);
  document.getElementById('stats').innerHTML=top.map(([d,c])=>`<div class="stat"><div class="label">${esc(d)}</div><div class="value">${c}</div></div>`).join('');
  // Domain filter options
  const allDomains=[...new Set(events.map(e=>e.matchedDomain))].sort();
  const sel=document.getElementById('f-domain');
  const cur=sel.value;
  sel.innerHTML='<option value="">All Domains</option>'+allDomains.map(d=>`<option value="${d}" ${d===cur?'selected':''}>${esc(d)}</option>`).join('');
}
function showDetail(e,type){
  const o=document.getElementById('overlay'),p=document.getElementById('detail');
  const body=type==='req'?e.requestBody:e.responseBody;
  p.innerHTML=`<h2>${type==='req'?'Request':'Response'} Body — ${esc(e.method)} ${esc(e.url)}</h2><div class="meta"><div><span class="k">Domain:</span> ${esc(e.matchedDomain)}</div><div><span class="k">Time:</span> ${new Date(e.timestamp).toISOString()}</div></div><pre>${esc(body||'(empty)')}</pre>`;
  o.classList.add('open');
}
document.getElementById('tbody').addEventListener('click',e=>{
  const c=e.target.closest('.body-cell');if(!c)return;
  const[idx,type]=c.dataset.body.split('-');const f=getFiltered();if(f[idx])showDetail(f[idx],type==='req'?'req':'res');
});
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open')});
document.getElementById('btn-clear').addEventListener('click',()=>fetch('/api/events',{method:'DELETE'}));
document.getElementById('f-domain').addEventListener('change',render);
document.getElementById('f-method').addEventListener('change',render);
connect();
</script>
</body>
</html>
